name: Build App

on: [push]

permissions:
  contents: write

jobs:

  build32:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build 32-bit project
        run: |
          rustup target add i686-pc-windows-msvc
          cargo build -p payload --release --target i686-pc-windows-msvc

      - name: Rename 32-bit dll
        shell: powershell
        run: Rename-Item -Path .\target\i686-pc-windows-msvc\release\utils.dll -NewName utils32.dll

      - name: Upload x86 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x86-binaries
          path: target/i686-pc-windows-msvc/release/utils32.dll
          if-no-files-found: error


  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build 64-bit project
        run: cargo build --release

      - name: Upload built binaries
        uses: actions/upload-artifact@v4
        with:
          name: x64-binaries
          path: |
            target/release/*.exe
            target/release/*.dll
          if-no-files-found: error


  release:
    runs-on: windows-latest
    needs: [build, build32]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: "*-binaries"
          path: dist
          merge-multiple: true

      - name: Create zip bundle
        run: |
          7z a -tzip AkhilInvisible.zip .\hide.ahk .\dist\*.dll .\dist\*.exe

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        run: |
          mkdir installer
          iscc .\Misc\inno.iss /O+installer

      - name: Show generated files
        run: dir /s

      - name: Publish latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          generate_release_notes: true
          files: |
            AkhilInvisible.zip
            installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: startsWith(github.ref, 'refs/tags/v')
        name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          generate_release_notes: true
          files: |
            AkhilInvisible.zip
            installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
