
name: Build App

on: [push]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build32:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build 32-bit
        run: |
          rustup target add i686-pc-windows-msvc
          cargo build -p payload --release --target i686-pc-windows-msvc

      - name: Rename DLL
        shell: powershell
        run: Rename-Item -Path .\target\i686-pc-windows-msvc\release\utils.dll -NewName utils32.dll

      - uses: actions/upload-artifact@v4
        with:
          name: x86-binaries
          path: target/i686-pc-windows-msvc/release/utils32.dll


  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build 64-bit
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: x64-binaries
          path: |
            target/release/*.exe
            target/release/*.dll


  release:
    runs-on: windows-latest
    needs: [build, build32]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: "*-binaries"
          path: dist
          merge-multiple: true

      - name: Create ZIP
        run: |
          7z a -tzip AkhilInvisible.zip .\hide.ahk .\dist\*.dll .\dist\*.exe

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        run: iscc .\Misc\inno.iss

      - name: Show Files
        shell: powershell
        run: Get-ChildItem -Recurse

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          generate_release_notes: true
          files: |
            AkhilInvisible.zip
            Misc/Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

